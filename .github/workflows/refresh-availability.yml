name: Refresh Availability (hourly)

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for page cache
        id: cache-check
        run: |
          if [ -f scraped_pages.json ]; then
            echo "has_cache=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cache=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate with fresh availability
        if: steps.cache-check.outputs.has_cache == 'true'
        env:
          TH_TOKEN: ${{ secrets.TH_TOKEN }}
        run: python scripts/scrape.py --regen

      - name: Setup Pages
        if: steps.cache-check.outputs.has_cache == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.cache-check.outputs.has_cache == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.cache-check.outputs.has_cache == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Skip - no cache available
        if: steps.cache-check.outputs.has_cache != 'true'
        run: echo "No scraped_pages.json cache found. Run the full scrape workflow first."
