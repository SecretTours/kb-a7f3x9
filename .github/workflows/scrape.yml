name: Full Scrape and Deploy (daily)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install firecrawl CLI
        run: npm install -g firecrawl-cli

      - name: Full scrape + generate
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          TH_TOKEN: ${{ secrets.TH_TOKEN }}
        run: python scripts/scrape.py
        timeout-minutes: 15

      - name: Save page cache for hourly refreshes
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TMP=$(mktemp)
          cp scraped_pages.json "$TMP"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            cp "$TMP" scraped_pages.json
            git add -f scraped_pages.json
            if git diff --cached --quiet; then
              echo "No changes to commit"
              exit 0
            fi
            git commit -m "Update scraped pages cache [skip ci]"
            if git push; then
              exit 0
            fi
            echo "Push rejected, retrying ($i/5)..."
            sleep $((i * 2))
          done
          echo "Failed to push after 5 attempts" >&2
          exit 1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
